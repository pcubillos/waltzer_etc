[detector]

band = vis
mode = spectroscopy

# Wavelength ranges (micron)
wl_min = 0.425
wl_max = 0.797

# Spectral resolution R = lambda / FWHM
resolution = 3000.0

# Detector number of pixels
dimension = 4096, 2048

# Pixel scale (arcsec pix竅ｻﾂｹ)
pix_scale = 0.90354

# Spatial size (pixels)
aperture = 20

# Dark current (e s竅ｻﾂｹ pix竅ｻﾂｹ)
dark = 0.01

# Read noise (e read竅ｻﾂｹ pix竅ｻﾂｹ)
read_noise = 4.0

# All-other-systematic noises (e s竅ｻﾂｹ pix竅ｻﾂｹ)
systematic_noise = 0.25

# Throughput data
throughput_file = throughput_vis_ccd.dat

# Exposure time per read (s)
exp_time = 300.0
