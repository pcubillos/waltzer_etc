[detector]

band = nir
mode = photometry

# Wavelength ranges (micron)
wl_min = 0.9
wl_max = 1.6

# Spectral resolution R = lambda / FWHM
resolution = 3000.0

# Detector number of pixels
dimension = 1024, 1280

# Pixel scale (arcsec pix竅ｻﾂｹ)
pix_scale = 0.4

# Spatial size (pixels)
aperture = 10

# Dark current (e s竅ｻﾂｹ pix竅ｻﾂｹ)
dark = 250.0

# Read noise (e read竅ｻﾂｹ pix竅ｻﾂｹ)
read_noise = 240.0

# All-other-systematic noises (e read竅ｻﾂｹ pix竅ｻﾂｹ)
systematic_noise = 2340.0

# Throughput data
throughput_file = throughput_nir_swir.dat

# Exposure time per read (s)
exp_time = 300.0
